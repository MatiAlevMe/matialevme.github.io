name: Sync CV data from guia-laboral

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1" # weekly, Monday 06:00 UTC

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout portfolio repo
        uses: actions/checkout@v4
        with:
          path: matialevme.github.io

      - name: Checkout guia-laboral (private)
        uses: actions/checkout@v4
        with:
          repository: MatiAlevMe/guia-laboral
          token: ${{ secrets.GH_PAT }}
          path: guia-laboral

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run extract.py
        working-directory: matialevme.github.io
        run: python scripts/extract.py

      - name: Commit and push changes
        working-directory: matialevme.github.io
        run: |
          git config user.name "MatiAlevMe"
          git config user.email "inefableataraxia1@gmail.com"
          git add src/data/portfolio.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "sync: actualizar portfolio.json desde guia-laboral [skip ci]"
            git push
          fi
