name: Sync from guia-laboral

on:
  schedule:
    # Todos los lunes a las 9:00 UTC
    - cron: "0 9 * * 1"
  workflow_dispatch:
    inputs:
      guia_branch:
        description: "Rama de guia-laboral a sincronizar"
        default: main
        required: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout portfolio repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: portfolio

      - name: Checkout guia-laboral
        uses: actions/checkout@v4
        with:
          repository: MatiAlevMe/guia-laboral
          token: ${{ secrets.GH_PAT }}
          ref: ${{ inputs.guia_branch || 'main' }}
          path: guia-laboral

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Extract portfolio data
        working-directory: ./portfolio
        run: python3 scripts/extract.py

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ./portfolio/package-lock.json

      - name: Install dependencies
        working-directory: ./portfolio
        run: npm ci

      - name: Build
        working-directory: ./portfolio
        run: npm run build

      - name: Commit changes (if any)
        working-directory: ./portfolio
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/portfolio.json
          if git diff --cached --quiet; then
            echo "No hay cambios en los datos."
          else
            git commit -m "sync: actualizar datos desde guia-laboral [automático]"
            git push
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: portfolio/dist

  deploy:
    needs: sync
    if: always()
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
